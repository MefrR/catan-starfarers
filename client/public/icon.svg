<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#13203c"/>
      <stop offset="60%" stop-color="#0a1124"/>
      <stop offset="100%" stop-color="#060a16"/>
    </radialGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe07a"/>
      <stop offset="100%" stop-color="#ff9e2c"/>
    </linearGradient>
    <linearGradient id="flame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd23f"/>
      <stop offset="100%" stop-color="#ff5d3a"/>
    </linearGradient>
  </defs>
  <!-- full-bleed dark field (safe for maskable) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- scattered stars -->
  <g fill="#9db8e8" opacity="0.85">
    <circle cx="96" cy="120" r="3"/><circle cx="150" cy="360" r="2.4"/>
    <circle cx="408" cy="150" r="3.2"/><circle cx="372" cy="396" r="2.6"/>
    <circle cx="120" cy="250" r="2"/><circle cx="430" cy="300" r="2.2"/>
    <circle cx="250" cy="86" r="2.2"/><circle cx="300" cy="430" r="2.4"/>
  </g>
  <!-- ringed planet, lower-left accent -->
  <g transform="translate(150 372)">
    <circle r="34" fill="#39d8c8" opacity="0.92"/>
    <ellipse rx="58" ry="18" fill="none" stroke="#7ad0ff" stroke-width="6" opacity="0.8" transform="rotate(-22)"/>
  </g>
  <!-- rocket, centered in the safe zone -->
  <g transform="translate(256 250) rotate(45)">
    <path d="M0 -118 C 36 -78 44 -18 44 30 L -44 30 C -44 -18 -36 -78 0 -118 Z" fill="url(#body)" stroke="#7a4a10" stroke-width="4"/>
    <circle cx="0" cy="-44" r="20" fill="#0a1124" stroke="#7ad0ff" stroke-width="5"/>
    <path d="M-44 18 L -78 64 L -44 52 Z" fill="#ff5d5d"/>
    <path d="M44 18 L 78 64 L 44 52 Z" fill="#ff5d5d"/>
    <path d="M-22 30 C -22 70 22 70 22 30 Z" fill="url(#flame)"/>
  </g>
</svg>
